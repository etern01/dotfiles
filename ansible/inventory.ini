# Ansible inventory file
# ============================================
# Usage: ansible-playbook -i inventory.ini playbook.yml

# ============================================
# Proxmox VMs
# ============================================
[proxmox]
vm01 ansible_host=192.168.1.10 ansible_user=root
vm02 ansible_host=192.168.1.11 ansible_user=root

# ============================================
# Cloud servers
# ============================================
[cloud]
# aws-server ansible_host=54.x.x.x ansible_user=ubuntu
# hetzner-server ansible_host=123.x.x.x ansible_user=root

# ============================================
# All servers
# ============================================
[all:children]
proxmox
cloud

# ============================================
# Variables
# ============================================
[all:vars]
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
