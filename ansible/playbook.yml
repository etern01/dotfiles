---
# Ansible playbook for dotfiles deployment
# Usage: ansible-playbook -i inventory.ini playbook.yml

- name: Deploy dotfiles and install packages
  hosts: all
  become: true
  gather_facts: true

  vars:
    dotfiles_dir: "~/.dotfiles"
    dotfiles_repo: "https://github.com/yourusername/dotfiles.git"

  tasks:
    # ============================================
    # Install packages (Debian/Ubuntu)
    # ============================================
    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name:
          - htop
          - btop
          - tmux
          - vim
          - jq
          - tree
          - curl
          - wget
          - rsync
          - dnsutils
          - net-tools
          - iproute2
          - nmap
          - ncat
          - mtr-tiny
          - socat
          - tcpdump
          - iftop
          - nethogs
          - strace
          - lsof
          - iotop
          - sysstat
          - ncdu
          - lnav
          - fzf
          - ripgrep
          - fd-find
          - bat
          - grc
          - zoxide
          - httpie
          - git
          - bash-completion
          - openssh-client
        state: present

    - name: Install Docker (if not present)
      block:
        - name: Add Docker GPG key
          apt_key:
            url: https://download.docker.com/linux/ubuntu/gpg
            state: present

        - name: Add Docker repository
          apt_repository:
            repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
            state: present

        - name: Install Docker packages
          apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-compose-plugin
            state: present

        - name: Add user to docker group
          user:
            name: "{{ ansible_user }}"
            groups: docker
            append: true
      when: ansible_distribution in ['Ubuntu', 'Debian']
      tags: docker

    # ============================================
    # Install additional tools
    # ============================================
    - name: Install yq
      get_url:
        url: https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        dest: /usr/local/bin/yq
        mode: '0755'
      tags: tools

    - name: Install lazygit
      unarchive:
        src: "https://github.com/jesseduffield/lazygit/releases/latest/download/lazygit_{{ lazygit_version }}_Linux_x86_64.tar.gz"
        dest: /tmp
        remote_src: yes
      vars:
        lazygit_version: "{{ lookup('url', 'https://api.github.com/repos/jesseduffield/lazygit/releases/latest', split_lines=False) | from_json | json_query('tag_name') | regex_replace('^v', '') }}"
      tags: tools

    - name: Copy lazygit to /usr/local/bin
      copy:
        src: /tmp/lazygit
        dest: /usr/local/bin/lazygit
        mode: '0755'
        remote_src: yes
      tags: tools

    - name: Install atuin
      shell: |
        curl --proto '=https' --tlsv1.2 -LsSf https://setup.atuin.sh | sh
      args:
        creates: /root/.atuin
      tags: tools

    # ============================================
    # Clone dotfiles repository
    # ============================================
    - name: Clone dotfiles repository
      git:
        repo: "{{ dotfiles_repo }}"
        dest: "{{ dotfiles_dir }}"
        version: main
        force: true
      become: false
      tags: dotfiles

    # ============================================
    # Create symlinks
    # ============================================
    - name: Create symlinks for dotfiles
      file:
        src: "{{ dotfiles_dir }}/{{ item.src }}"
        dest: "{{ ansible_env.HOME }}/{{ item.dest }}"
        state: link
        force: true
      become: false
      loop:
        - { src: 'bash/.bashrc', dest: '.bashrc' }
        - { src: 'bash/.bash_aliases', dest: '.bash_aliases' }
        - { src: 'bash/.bash_functions', dest: '.bash_functions' }
        - { src: 'bash/.bash_prompt', dest: '.bash_prompt' }
        - { src: 'vim/.vimrc', dest: '.vimrc' }
        - { src: 'tmux/.tmux.conf', dest: '.tmux.conf' }
      tags: dotfiles

    - name: Create SSH config symlink (if not exists)
      file:
        src: "{{ dotfiles_dir }}/ssh/config"
        dest: "{{ ansible_env.HOME }}/.ssh/config"
        state: link
        force: false
      become: false
      tags: dotfiles

    # ============================================
    # Install vim plugins
    # ============================================
    - name: Install vim-plug
      get_url:
        url: https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
        dest: "{{ ansible_env.HOME }}/.vim/autoload/plug.vim"
        mode: '0644'
      become: false
      tags: vim

    - name: Install vim plugins
      command: vim +PlugInstall +qall
      become: false
      environment:
        HOME: "{{ ansible_env.HOME }}"
      tags: vim
      changed_when: false

    # ============================================
    # Create SSH sockets directory
    # ============================================
    - name: Create SSH sockets directory
      file:
        path: "{{ ansible_env.HOME }}/.ssh/sockets"
        state: directory
        mode: '0700'
      become: false
      tags: ssh

    # ============================================
    # Install Oh My Bash
    # ============================================
    - name: Check if Oh My Bash is installed
      stat:
        path: "{{ ansible_env.HOME }}/.oh-my-bash/oh-my-bash.sh"
      register: omb_check
      become: false

    - name: Install Oh My Bash
      shell: |
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/ohmybash/oh-my-bash/master/tools/install.sh)" "" --unattended
      args:
        creates: "{{ ansible_env.HOME }}/.oh-my-bash/oh-my-bash.sh"
      become: false
      when: not omb_check.stat.exists
      tags: omb

    # ============================================
    # Install Oh My Bash custom plugins
    # ============================================
    - name: Create Oh My Bash custom plugins directory
      file:
        path: "{{ ansible_env.HOME }}/.oh-my-bash/custom/plugins"
        state: directory
        mode: '0755'
      become: false
      tags: omb

    - name: Install Oh My Bash custom plugins
      copy:
        src: "plugins/{{ item }}/"
        dest: "{{ ansible_env.HOME }}/.oh-my-bash/custom/plugins/{{ item }}/"
        mode: '0755'
      become: false
      loop:
        - docker
        - docker-compose
        - alias-tips
        - extract
        - history
      tags: omb

    # ============================================
    # Configure bash as default shell
    # ============================================
    - name: Set bash as default shell
      user:
        name: "{{ ansible_user }}"
        shell: /bin/bash
      tags: shell
