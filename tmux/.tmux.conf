# ~/.tmux.conf - Tmux configuration for DevOps/SysAdmin
# ============================================

# ============================================
# Prefix key
# ============================================
# Change prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ============================================
# General settings
# ============================================
set -g default-terminal "screen-256color"
set -g display-time 3000
set -g escape-time 0
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Mouse support
set -g mouse on

# ============================================
# Window splitting
# ============================================
# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ============================================
# Navigation
# ============================================
# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================
# Copy mode
# ============================================
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# ============================================
# Status bar
# ============================================
set -g status-position bottom
set -g status-bg colour235
set -g status-fg colour245
set -g status-interval 5
set -g status-justify left

# Status bar content
set -g status-left-length 40
set -g status-left "#[fg=colour232,bg=colour39] #S #[fg=colour39,bg=colour235] "
set -g status-right "#[fg=colour240]#(hostname) #[fg=colour245]%H:%M %d-%b-%y"

# Window status
setw -g window-status-format "#[fg=colour245] #I:#W "
setw -g window-status-current-format "#[fg=colour232,bg=colour39] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour39

# ============================================
# Key bindings
# ============================================

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Kill window
bind k confirm-before -p "kill-window #W? (y/n)" kill-window

# Swap panes
bind < swap-pane -U
bind > swap-pane -D

# Sync panes (send input to all panes)
bind S setw synchronize-panes

# ============================================
# Sessions
# ============================================

# Quick session templates
bind n new-session -c "#{pane_current_path}"

# ============================================
# Plugins (if using TPM)
# ============================================
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# run '~/.tmux/plugins/tpm/tpm'
